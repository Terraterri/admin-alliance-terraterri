name: Deploy Admin Alliance Terraterri

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: terraterri-454406
  REGION: asia-south1
  SERVICE_NAME: admin-alliance-terraterri
  IMAGE_NAME: asia-south1-docker.pkg.dev/terraterri-454406/admin-alliance-terraterri/admin-alliance-terraterri:latest
  SERVICE_ACCOUNT: developer2propy@terraterri-454406.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -- Added Improvement: Linting before deployment to catch errors early --
      - name: Set up Node.js for Linting
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies for Linting
        run: npm ci

      - name: Lint Code
        run: npm run lint
      # ------------------------------------------------------------------------

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Authentication
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME .

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image=$IMAGE_NAME \
            --region=$REGION \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=1 \
            --max-instances=100 \
            --service-account=$SERVICE_ACCOUNT \
            --project=$PROJECT_ID

      - name: Show Service URL
        run: |
          gcloud run services describe $SERVICE_NAME \
            --region=$REGION \
            --format="value(status.url)"
